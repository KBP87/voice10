<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>VoicePunjab Punjabi TTS</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <div class="brand">
        <div class="logo">VP</div>
        <div>
          <h1>VoicePunjab</h1>
          <p class="sub">Punjabi Text-to-Speech (Gurmukhi → MP3)</p>
        </div>
      </div>

      <div class="status" id="status">
        <span class="dot"></span>
        <span>Checking server…</span>
      </div>
    </header>

    <main class="grid">
      <section class="card">
        <h2>Option A: Type Punjabi (Gurmukhi)</h2>
        <textarea id="textA" placeholder="Type Punjabi (Gurmukhi) here…"></textarea>

        <div class="row">
          <label>
            Voice
            <select id="voice">
              <option value="">Default</option>
              <option value="pa-IN-Wavenet-A">Female (Wavenet A)</option>
              <option value="pa-IN-Wavenet-B">Male (Wavenet B)</option>
              <option value="pa-IN-Wavenet-C">Female (Wavenet C)</option>
              <option value="pa-IN-Wavenet-D">Male (Wavenet D)</option>
            </select>
          </label>

          <label>
            Speed
            <input id="speed" type="number" step="0.1" min="0.25" max="4" value="1" />
          </label>

          <label>
            Pitch
            <input id="pitch" type="number" step="1" min="-20" max="20" value="0" />
          </label>
        </div>

        <div class="actions">
          <button class="btn primary" id="btnPlayA">Generate & Play</button>
          <button class="btn" id="btnDownloadA" disabled>Download MP3</button>
        </div>

        <audio id="playerA" controls></audio>
        <p class="hint">Counts against daily limit.</p>
      </section>

      <section class="card">
        <h2>Option B: English Punjabi → Convert → MP3</h2>
        <textarea id="textB" placeholder="Type Roman/English Punjabi here…"></textarea>

        <div class="actions">
          <button class="btn" id="btnConvert">Convert</button>
          <button class="btn" id="btnPasteToA" disabled>Paste to Option A</button>
        </div>

        <div class="converted">
          <div class="label">Converted Punjabi:</div>
          <div class="box" id="convertedText">(empty)</div>
        </div>
      </section>
    </main>
  </div>

<script>
  // ✅ ONE PLACE to switch API:
  // Local: keep "" (calls same host /api/tts)
  // Cloud Run: set to "https://voicepunjab-api-777821135954.us-central1.run.app"
  const API_BASE = "https://voicepunjab-api-777821135954.us-central1.run.app"; 

  const statusEl = document.getElementById("status");
  const setStatus = (ok, msg) => {
    statusEl.classList.toggle("ok", !!ok);
    statusEl.classList.toggle("bad", !ok);
    statusEl.querySelector("span:last-child").textContent = msg;
  };

  async function checkHealth(){
    try{
      const res = await fetch(`${API_BASE}/health`);
      if(!res.ok) throw new Error("health not ok");
      setStatus(true, "Server connected ✅");
    }catch(e){
      setStatus(false, "Server not connected ❌");
    }
  }
  checkHealth();

  async function postJSON(url, data){
    const res = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data),
    });
    const json = await res.json().catch(() => ({}));
    if(!res.ok) throw new Error(json.error || "Request failed");
    return json;
  }

  function base64ToBlob(base64, mime="audio/mpeg"){
    const byteChars = atob(base64);
    const byteNums = new Array(byteChars.length);
    for (let i = 0; i < byteChars.length; i++) byteNums[i] = byteChars.charCodeAt(i);
    const byteArray = new Uint8Array(byteNums);
    return new Blob([byteArray], { type: mime });
  }

  let lastBlobA = null;

  document.getElementById("btnPlayA").addEventListener("click", async () => {
    const text = document.getElementById("textA").value.trim();
    const voiceName = document.getElementById("voice").value || undefined;
    const speakingRate = Number(document.getElementById("speed").value || 1);
    const pitch = Number(document.getElementById("pitch").value || 0);

    if(!text) return alert("Please type Punjabi text first.");

    try{
      const data = await postJSON(`${API_BASE}/api/tts`, { text, voiceName, speakingRate, pitch });
      const blob = base64ToBlob(data.audioBase64);
      lastBlobA = blob;

      const url = URL.createObjectURL(blob);
      const player = document.getElementById("playerA");
      player.src = url;
      await player.play();

      document.getElementById("btnDownloadA").disabled = false;
    }catch(e){
      alert("TTS failed: " + e.message);
    }
  });

  document.getElementById("btnDownloadA").addEventListener("click", () => {
    if(!lastBlobA) return;
    const a = document.createElement("a");
    a.href = URL.createObjectURL(lastBlobA);
    a.download = "voicepunjab.mp3";
    document.body.appendChild(a);
    a.click();
    a.remove();
  });

  document.getElementById("btnConvert").addEventListener("click", async () => {
    const text = document.getElementById("textB").value.trim();
    if(!text) return alert("Type English Punjabi first.");
    try{
      const data = await postJSON(`${API_BASE}/api/convert`, { text });
      document.getElementById("convertedText").textContent = data.gurmukhi || "(empty)";
      document.getElementById("btnPasteToA").disabled = !(data.gurmukhi && data.gurmukhi.trim());
    }catch(e){
      alert("Convert failed: " + e.message);
    }
  });

  document.getElementById("btnPasteToA").addEventListener("click", () => {
    const t = document.getElementById("convertedText").textContent;
    if(!t || t === "(empty)") return;
    document.getElementById("textA").value = t;
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
</script>
</body>
</html>
